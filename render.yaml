version: "1"

services:
  # Backend Web Service
  - type: web
    name: memory-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        fromDatabase:
          name: memory-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://memory-frontend.onrender.com
    
  # Frontend Static Site
  - type: web
    name: memory-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/build
    rootDir: frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://memory-backend.onrender.com/api
      - key: NODE_ENV
        value: production

databases:
  - name: memory-db
    databaseName: memory_portal
    user: memory_user
    plan: free
