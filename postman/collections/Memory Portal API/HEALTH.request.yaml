$kind: http-request
name: HEALTH
url: "{{baseUrl}}/api/health"
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response contains running\", function () {\r

      \    pm.expect(pm.response.text()).to.include(\"running\");\r

      });"
    language: text/javascript
order: 1000
